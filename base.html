<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{% block tittle %}{% endblock %}</title>
</head>
<body>
<div class="page">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
  <div class="col-md-3 mb-2 mb-md-0">
    <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
      <img class="header__img" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="logo" >
        <use xlink:href="#bootstrap"></use>
      </svg>
    </a>
  </div>
  <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
    <li><a href="{{ url_for ('index') }}" class="nav-link px-2 link-secondary">Главная </a></li>
    <li><a href="{{ url_for ('about') }}" class="nav-link px-2">О нас</a></li>
    <li>
  <div class="col-md-3 text-end">
    <button type="button" class="btn btn-outline-primary me-2">Войти</button>
    <button type="button" class="btn btn-primary">Зарегистрироваться</button>
</header>
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <footer class="d-flex flex wrap justify-content-between aligin-itens-center py 3 ny-4 border top">
        <div class="col-nd-4 d-flex align-itemes-center">
            <a href="/" class="mb-3 me-2 mb-md-0 text-muted text-decoration-none lh-1">
                <img class="header__img" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="logo" >
            </a>
            </footer>
</div>
</body>
</html>
